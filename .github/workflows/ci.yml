name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Single source of truth for the test-suite path (renamed in one place if the
# skill directory moves).
env:
  FP_TESTS: skills/forgeproof/scripts/test_forgeproof.py

jobs:
  test:
    name: pytest (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - run: python -m pytest ${{ env.FP_TESTS }} -v

  # Windows engine-CLI coverage under both shells a user can realistically
  # spawn Python from. Hooks and skills never execute under cmd.exe (Claude
  # Code uses Git Bash or PowerShell), but the engine CLI itself must work
  # when invoked from either.
  test-windows-shells:
    name: pytest (windows, git-bash + cmd)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pytest
      - name: pytest from Git Bash
        shell: bash
        run: python -m pytest "${FP_TESTS}" -v
      - name: pytest from cmd.exe
        shell: cmd
        run: python -m pytest %FP_TESTS% -v

  # Minimal Linux: python3 exists, `python` does not. This is the environment
  # where the v1.0.1 PR gate failed open (exit 2 -> || -> exit 127); the suite
  # must pass with no `python` symlink present.
  test-python3-only:
    name: pytest (debian, python3 only)
    runs-on: ubuntu-latest
    container: debian:stable-slim
    steps:
      - name: Install python3 + openssh-client (no python symlink)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-pytest openssh-client git ca-certificates
      - uses: actions/checkout@v4
      - name: Assert `python` is absent
        run: |
          if command -v python; then
            echo "'python' exists in this container; the python3-only scenario is not being tested" >&2
            exit 1
          fi
      - run: python3 -m pytest "${FP_TESTS}" -v

  validate:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      # Always validate the plugin manifest explicitly: validating the repo
      # root would trigger marketplace mode (.claude-plugin/marketplace.json).
      - run: claude plugin validate .claude-plugin/plugin.json
      - run: claude plugin validate .claude-plugin/plugin.json --strict
