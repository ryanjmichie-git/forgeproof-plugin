name: Stress

# Full end-to-end stress matrix (sample projects of varying complexity driven
# through the real engine CLI). Runs manually, or when the harness itself
# changes (workflow_dispatch only works from the default branch, so the push
# trigger is what exercises release branches).
on:
  workflow_dispatch:
  push:
    paths:
      - "stress/**"
      - ".github/workflows/stress.yml"

jobs:
  stress:
    name: stress (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python stress/run_stress.py --json stress-results-${{ matrix.os }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results-${{ matrix.os }}
          path: stress-results-*.json

  stress-python3-only:
    name: stress (debian, python3 only)
    runs-on: ubuntu-latest
    container: debian:stable-slim
    steps:
      - name: Install python3 + openssh-client (no python symlink)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends python3 python3-venv openssh-client git ca-certificates
      - uses: actions/checkout@v4
      - name: Assert `python` is absent
        run: |
          if command -v python; then
            echo "'python' exists; the python3-only scenario is not being tested" >&2
            exit 1
          fi
      - run: python3 stress/run_stress.py --json stress-results-debian.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-results-debian
          path: stress-results-debian.json
